<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Housify</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

  <div class="auth-wrapper">
    
    <div class="auth-side-image" style="background-image: url('https://images.unsplash.com/photo-1560518883-ce09059eeffa?w=800')">
      <div class="auth-image-overlay"></div>
      <div class="auth-image-content">
        <a href="index.html" class="auth-logo">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          Housify
        </a>
        <p class="auth-quote">"Home is where our story begins. Let us help you find yours."</p>
      </div>
    </div>

    <div class="auth-side-form flex-center">
      <div class="auth-card">
        <div class="auth-header">
          <h1>Welcome Back</h1>
          <p>Login to your Housify account</p>
        </div>

        <div id="auth-error" class="auth-error-msg hidden">Invalid email or password</div>

        <form id="login-form">
          <div class="form-group">
            <label for="email">Email Address</label>
            <div class="input-icon-wrap">
              <i class="fas fa-envelope"></i>
              <input type="email" id="email" placeholder="name@example.com" required>
            </div>
          </div>

          <div class="form-group">
            <div class="flex-between">
              <label for="password">Password</label>
              <a href="#" class="forgot-link">Forgot Password?</a>
            </div>
            <div class="input-icon-wrap">
              <i class="fas fa-lock"></i>
              <input type="password" id="password" placeholder="••••••••" required>
              <button type="button" class="pw-toggle" id="toggle-pw"><i class="fas fa-eye"></i></button>
            </div>
          </div>

          <div class="auth-extras flex-between">
            <label class="check-container">Remember Me
              <input type="checkbox">
              <span class="checkmark"></span>
            </label>
          </div>

          <button type="submit" class="btn btn-accent w-100 btn-auth" id="login-btn">
            <span class="btn-text">Login</span>
            <div class="btn-spinner hidden"></div>
          </button>

          <p class="auth-footer">Don't have an account? <a href="register.html">Register here →</a></p>
        </form>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
